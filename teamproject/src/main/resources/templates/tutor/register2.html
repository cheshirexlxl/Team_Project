<div xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/main_layout}">

    <th:block layout:fragment="extra-css">
        <link rel="stylesheet" href="/css/tutor-register-admin.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    </th:block>

    <div layout:fragment="content">
        <div class="container py-5" style="max-width: 720px;">
            <div class="mb-4 text-center">
                <h2 class="h4 fw-bold">튜터 회원가입 (3/4단계)</h2>
                <p class="text-muted mb-0">수업 과목 및 분야를 선택해 주세요.</p>
            </div>

            <div class="progress mb-4" style="height: 8px;">
                <div class="progress-bar" role="progressbar" style="width: 75%;" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100"></div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form id="tutorProfileForm">
                        <div class="mb-4">
                            <h5 class="fw-bold">수업 구성 (과목 + 분야 + 수업당 가격)</h5>
                            <div class="mb-3">
                                <label class="form-label small text-muted">과목</label>
                                <div id="subjectButtons" class="d-flex flex-wrap gap-2"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small text-muted">일반 분야</label>
                                <div id="generalFieldButtons" class="d-flex flex-wrap gap-2"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small text-muted">분야별</label>
                                <div id="domainFieldButtons" class="d-flex flex-wrap gap-2"></div>
                                <small class="text-muted d-block mt-2">일반 분야/분야별 중 하나만 선택됩니다.</small>
                            </div>
                            <div class="row g-2 align-items-end">
                                <div class="col-md-6">
                                    <label class="form-label small text-muted">수업당 가격(원)</label>
                                    <input type="number" class="form-control" id="lessonPriceInput" min="0" step="1000" placeholder="예) 30000">
                                </div>
                                <div class="col-md-6 d-flex justify-content-end">
                                    <button type="button" class="btn btn-outline-primary" id="btnAddLessonCard">수업 추가</button>
                                </div>
                            </div>
                            <div class="d-flex flex-wrap gap-2 mt-3" id="lessonCardList"></div>
                            <small class="text-muted d-block mt-2">추가된 수업이 실제 노출/결제 단가로 사용됩니다.</small>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-secondary" style="height: 45px; line-height: 1; display: flex; align-items: center; justify-content: center;" onclick="history.back()">이전</button>
                            <button type="submit" class="btn btn-primary flex-fill" style="height: 45px; line-height: 1; display: flex; align-items: center; justify-content: center;">다음 단계로</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script>
            function getStoredTokens() {
                return {
                    accessToken: localStorage.getItem('accessToken'),
                    refreshToken: localStorage.getItem('refreshToken')
                };
            }

            async function fetchMe(accessToken) {
                let response = await fetch('/api/users/me', {
                    headers: { Authorization: `Bearer ${accessToken}` }
                });
                if (response.ok) {
                    const data = await response.json();
                    return data && data.success ? data.data : null;
                }

                // 토큰 갱신
                const refreshToken = localStorage.getItem('refreshToken');
                const refreshResponse = await fetch('/api/auth/refresh', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refreshToken: refreshToken })
                });
                if (!refreshResponse.ok) {
                    return null;
                }
                const refreshData = await refreshResponse.json();
                if (refreshData && refreshData.success && refreshData.data && refreshData.data.accessToken) {
                    const newAccessToken = refreshData.data.accessToken;
                    localStorage.setItem('accessToken', newAccessToken);
                    if (refreshData.data.refreshToken) {
                        localStorage.setItem('refreshToken', refreshData.data.refreshToken);
                    }
                    // 갱신된 토큰으로 다시 시도
                    response = await fetch('/api/users/me', {
                        headers: { Authorization: `Bearer ${newAccessToken}` }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        return data && data.success ? data.data : null;
                    }
                }
                return null;
            }

            function isTutor(authList) {
                if (!Array.isArray(authList)) {
                    return false;
                }
                return authList.some((a) =>
                    a.auth === 'ROLE_TUTOR' ||
                    a.auth === 'ROLE_TUTOR_PENDING' ||
                    a === 'ROLE_TUTOR' ||
                    a === 'ROLE_TUTOR_PENDING'
                );
            }

            let fieldOptionsCache = [];
            let selectedSubject = '';
            let selectedField = '';
            let selectedFieldId = '';
            let selectedFieldType = '';

            function setActiveButton(container, targetBtn) {
                container.querySelectorAll('button').forEach(btn => {
                    btn.classList.remove('btn-primary');
                    btn.classList.add('btn-outline-primary');
                });
                if (targetBtn) {
                    targetBtn.classList.add('btn-primary');
                    targetBtn.classList.remove('btn-outline-primary');
                }
            }

            function renderSubjectButtons(subjects) {
                const subjectContainer = document.getElementById('subjectButtons');
                if (!subjectContainer) return;
                subjectContainer.innerHTML = '';

                subjects.forEach((subject) => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'btn btn-sm btn-outline-primary rounded-pill';
                    btn.textContent = subject;
                    btn.addEventListener('click', () => {
                        selectedSubject = subject;
                        setActiveButton(subjectContainer, btn);
                    });
                    subjectContainer.appendChild(btn);
                });
            }

            function renderFieldButtons(fields) {
                const generalContainer = document.getElementById('generalFieldButtons');
                const domainContainer = document.getElementById('domainFieldButtons');
                if (!generalContainer || !domainContainer) return;

                generalContainer.innerHTML = '';
                domainContainer.innerHTML = '';
                fieldOptionsCache = fields;

                fields.forEach((field) => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'btn btn-sm btn-outline-primary rounded-pill';
                    btn.textContent = field.name;
                    btn.dataset.fieldId = field.id;
                    btn.dataset.fieldType = field.category === 'DOMAIN' ? 'DOMAIN' : 'GENERAL';

                    btn.addEventListener('click', () => {
                        selectedField = field.name;
                        selectedFieldId = String(field.id);
                        selectedFieldType = btn.dataset.fieldType;

                        if (selectedFieldType === 'DOMAIN') {
                            setActiveButton(domainContainer, btn);
                            setActiveButton(generalContainer, null);
                        } else {
                            setActiveButton(generalContainer, btn);
                            setActiveButton(domainContainer, null);
                        }
                    });

                    if (field.category === 'DOMAIN') {
                        domainContainer.appendChild(btn);
                    } else {
                        generalContainer.appendChild(btn);
                    }
                });
            }

            function renderLessonCards(lessonCards) {
                const list = document.getElementById('lessonCardList');
                if (!list) return;
                list.innerHTML = '';

                lessonCards.forEach((card, index) => {
                    const item = document.createElement('div');
                    item.className = 'admin-chip';
                    item.innerHTML = `
                        <span class="label">${card.label}</span>
                        <span class="sub">${new Intl.NumberFormat('ko-KR').format(card.price)}원</span>
                        <button type="button" class="icon-btn danger" aria-label="삭제"><i class="bi bi-x"></i></button>
                    `;
                    item.querySelector('button').addEventListener('click', () => {
                        lessonCards.splice(index, 1);
                        sessionStorage.setItem('tutorRegisterStep3', JSON.stringify({
                            ...getSavedStep3(),
                            lessonCards: lessonCards
                        }));
                        renderLessonCards(lessonCards);
                    });
                    list.appendChild(item);
                });
            }

            function getSavedStep3() {
                return JSON.parse(sessionStorage.getItem('tutorRegisterStep3') || '{}');
            }

            async function loadSubjects() {
                const response = await fetch('/api/subjects');
                if (!response.ok) {
                    console.error('Failed to load subjects');
                    return;
                }
                const data = await response.json();
                if (!data || data.success === false || !Array.isArray(data.data)) {
                    console.error('Invalid subjects data');
                    return;
                }
                const subjectNames = data.data.map((subject) => subject.name).filter(Boolean);
                renderSubjectButtons(subjectNames);
            }

            async function loadFields() {
                const response = await fetch('/api/language-fields');
                if (!response.ok) {
                    console.error('Failed to load fields');
                    return;
                }
                const data = await response.json();
                if (!data || data.success === false || !Array.isArray(data.data)) {
                    console.error('Invalid fields data');
                    return;
                }
                renderFieldButtons(data.data);
            }

            document.addEventListener('DOMContentLoaded', async () => {
                // ====== 수정: 권한 체크 완전 제거 (회원가입 진행) ======
                const subjectOptions = [
                    '영어', '한국어', '일본어', '중국어', '불어',
                    '스페인어', '독일어', '러시아어'
                ];
                await loadSubjects();
                await loadFields();

                // 이전에 저장된 데이터 불러오기
                const savedData = getSavedStep3();
                if (Array.isArray(savedData.lessonCards)) {
                    renderLessonCards(savedData.lessonCards);
                }

                document.getElementById('btnAddLessonCard')?.addEventListener('click', () => {
                    const subject = selectedSubject;
                    const field = selectedField;
                    const priceRaw = document.getElementById('lessonPriceInput')?.value || '';
                    const price = Number(priceRaw);

                    if (!subject || !field) {
                        alert('과목과 분야를 선택해주세요.');
                        return;
                    }
                    if (!priceRaw || Number.isNaN(price) || price <= 0) {
                        alert('수업당 가격을 입력해주세요.');
                        return;
                    }

                    const label = `${subject}-${field}`;
                    const currentSaved = getSavedStep3();
                    const lessonCards = Array.isArray(currentSaved.lessonCards) ? currentSaved.lessonCards : [];
                    lessonCards.push({
                        label,
                        subject,
                        field,
                        fieldId: selectedFieldId,
                        fieldType: selectedFieldType,
                        price
                    });
                    sessionStorage.setItem('tutorRegisterStep3', JSON.stringify({
                        ...currentSaved,
                        lessonCards
                    }));
                    renderLessonCards(lessonCards);
                    document.getElementById('lessonPriceInput').value = '';
                    selectedField = '';
                    selectedFieldId = '';
                    selectedFieldType = '';
                    selectedSubject = '';
                    setActiveButton(document.getElementById('generalFieldButtons'), null);
                    setActiveButton(document.getElementById('domainFieldButtons'), null);
                    setActiveButton(document.getElementById('subjectButtons'), null);
                });
                // ====== 수정 종료 ======
            });

            document.getElementById('tutorProfileForm').addEventListener('submit', async (event) => {
                event.preventDefault();

                const savedData = getSavedStep3();
                const lessonCards = Array.isArray(savedData.lessonCards) ? savedData.lessonCards : [];
                const lessonLabels = lessonCards.length > 0
                    ? lessonCards.map(card => card.label)
                    : [];

                const fieldIds = Array.from(new Set(
                    lessonCards.map(card => card.fieldId).filter(Boolean)
                ));

                // 3단계 데이터 저장
                const step3Data = {
                    lessonSubjects: lessonLabels.join(', '),
                    fieldIds: fieldIds,
                    lessonCards: lessonCards
                };

                sessionStorage.setItem('tutorRegisterStep3', JSON.stringify(step3Data));

                // 다음 단계로 이동
                location.href = '/tutor/register3';
            });
        </script>
    </div>
</div>
