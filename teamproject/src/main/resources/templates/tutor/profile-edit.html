        <script>
            const getFallbackToken = () => localStorage.getItem('accessToken');
            const getAuthHeaders = () => {
                if (typeof buildAuthHeaders === 'function') {
                    return buildAuthHeaders();
                }
                const token = getFallbackToken();
                return token ? { 'Authorization': `Bearer ${token}` } : {};
            };

            async function ensureAuth() {
                const token = (typeof getAccessToken === 'function') ? getAccessToken() : getFallbackToken();
                if (token) return true;
                if (typeof refreshAccessToken === 'function') {
                    return await refreshAccessToken();
                }
                return false;
            }

            async function fetchWithAuth(url, options = {}) {
                const headers = { ...(options.headers || {}), ...getAuthHeaders() };
                const response = await fetch(url, {
                    ...options,
                    headers,
                    credentials: 'include'
                });

                if (response.status === 401 && typeof refreshAccessToken === 'function') {
                    const refreshed = await refreshAccessToken();
                    if (refreshed) {
                        const retryHeaders = { ...(options.headers || {}), ...getAuthHeaders() };
                        return fetch(url, {
                            ...options,
                            headers: retryHeaders,
                            credentials: 'include'
                        });
                    }
                }

                return response;
            }

            const sections = ["basic","profile","employment","account","documents","lessons","schedule","zoom","security"];
            const profileState = {
                loginId: "",
                email: "",
                nickname: "",
                name: "",
                phone: "",
                headline: "",
                bio: "",
                selfIntro: "",
                videoUrl: "",
                defaultZoomUrl: "",
                bankName: "",
                accountNumber: "",
                accountHolder: "",
                password: "",
                passwordConfirm: "",
                profileImgFile: null,
                profileImgUrl: ""
            };

            const documentDraft = {
                educationFiles: [],
                degreeFiles: [],
                certificateFiles: [],
                certificateTexts: [],
                careers: [],
                educations: [],
                degrees: [],
                employmentFiles: []
            };

            let documentTextsInitialized = false;
            let careersInitialized = false;
            let educationsInitialized = false;
            let certificateTextsDirty = false;
            let careerDirty = false;
            let educationDirty = false;
            let degreeDirty = false;

            function collectSectionValues(){
                if (document.getElementById('editEmail')) profileState.email = document.getElementById('editEmail').value || "";
                if (document.getElementById('editNickname')) profileState.nickname = document.getElementById('editNickname').value || "";
                if (document.getElementById('editName')) profileState.name = document.getElementById('editName').value || "";
                if (document.getElementById('editPhone')) profileState.phone = document.getElementById('editPhone').value || "";
                if (document.getElementById('editHeadline')) profileState.headline = document.getElementById('editHeadline').value || "";
                if (document.getElementById('editBio')) profileState.bio = document.getElementById('editBio').value || "";
                if (document.getElementById('editSelfIntro')) profileState.selfIntro = document.getElementById('editSelfIntro').value || "";
                if (document.getElementById('editVideoUrl')) profileState.videoUrl = document.getElementById('editVideoUrl').value || "";
                if (document.getElementById('editDefaultZoomUrl')) profileState.defaultZoomUrl = document.getElementById('editDefaultZoomUrl').value || "";
                if (document.getElementById('editBankName')) profileState.bankName = document.getElementById('editBankName').value || "";
                if (document.getElementById('editAccountNumber')) profileState.accountNumber = document.getElementById('editAccountNumber').value || "";
                if (document.getElementById('editAccountHolder')) profileState.accountHolder = document.getElementById('editAccountHolder').value || "";
                if (document.getElementById('editPassword')) profileState.password = document.getElementById('editPassword').value || "";
                if (document.getElementById('editPasswordConfirm')) profileState.passwordConfirm = document.getElementById('editPasswordConfirm').value || "";

                const profileImgInput = document.getElementById('editProfileImg');
                if (profileImgInput && profileImgInput.files[0]) {
                    profileState.profileImgFile = profileImgInput.files[0];
                }
            }

            function applyStateToSection(){
                const elements = {
                    editEmail: document.getElementById('editEmail'),
                    editNickname: document.getElementById('editNickname'),
                    editName: document.getElementById('editName'),
                    editPhone: document.getElementById('editPhone'),
                    editHeadline: document.getElementById('editHeadline'),
                    editBio: document.getElementById('editBio'),
                    editSelfIntro: document.getElementById('editSelfIntro'),
                    editVideoUrl: document.getElementById('editVideoUrl'),
                    editDefaultZoomUrl: document.getElementById('editDefaultZoomUrl'),
                    editBankName: document.getElementById('editBankName'),
                    editAccountNumber: document.getElementById('editAccountNumber'),
                    editAccountHolder: document.getElementById('editAccountHolder'),
                    currentProfileImg: document.getElementById('currentProfileImg')
                };

                // 안전하게 값 설정
                if (elements.editEmail) elements.editEmail.value = profileState.email || "";
                if (elements.editNickname) elements.editNickname.value = profileState.nickname || "";
                if (elements.editName) elements.editName.value = profileState.name || "";
                if (elements.editPhone) elements.editPhone.value = profileState.phone || "";
                if (elements.editHeadline) elements.editHeadline.value = profileState.headline || "";
                if (elements.editBio) elements.editBio.value = profileState.bio || "";
                if (elements.editSelfIntro) elements.editSelfIntro.value = profileState.selfIntro || "";
                if (elements.editVideoUrl) elements.editVideoUrl.value = profileState.videoUrl || "";
                if (elements.editDefaultZoomUrl) {
                    elements.editDefaultZoomUrl.value = profileState.defaultZoomUrl || "";
                    elements.editDefaultZoomUrl.dispatchEvent(new Event('input'));
                }
                if (elements.editBankName) {
                    elements.editBankName.value = profileState.bankName || "";
                    // select option selected 처리 (동적 렌더링 대응)
                    Array.from(elements.editBankName.options).forEach(opt => {
                        opt.selected = (opt.value === profileState.bankName);
                    });
                }
                if (elements.editAccountNumber) elements.editAccountNumber.value = profileState.accountNumber || "";
                if (elements.editAccountHolder) elements.editAccountHolder.value = profileState.accountHolder || "";
                
                // 프로필 이미지 처리
                if (elements.currentProfileImg && profileState.profileImgUrl) {
                    elements.currentProfileImg.classList.remove('bg-primary');
                    elements.currentProfileImg.innerHTML =
                        `<img src="${profileState.profileImgUrl}" class="rounded-circle w-100 h-100 object-fit-cover" alt="프로필">`;
                } else if (elements.currentProfileImg) {
                    elements.currentProfileImg.classList.add('bg-primary');
                    elements.currentProfileImg.innerHTML = `
                        <span class="fs-4">👨‍🏫</span>
                    `;
                }                
            }

            console.log('profileState 초기값:', profileState);

            // 프로필 이미지 변경 미리보기
            function bindProfileImagePreview() {
                const profileImgInput = document.getElementById('editProfileImg');
                const currentProfileImg = document.getElementById('currentProfileImg');                
                
                if (!profileImgInput || !currentProfileImg) return;               

                profileImgInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (!file) return;

                    // 상태 저장 (submit 때 사용)
                    profileState.profileImgFile = file;

                    // 미리보기 URL 생성
                    const previewUrl = URL.createObjectURL(file);

                    // 현재 currentProfileImg 요소에 img가 있는지 확인
                    const imgEl = currentProfileImg.querySelector('img');

                    if (imgEl) {
                        // 이미지 요소가 있으면 src만 변경
                        imgEl.src = previewUrl;
                    } else {
                        // 이미지 요소가 없으면(이모지 상태)
                        currentProfileImg.classList.remove('bg-primary');
                        currentProfileImg.innerHTML = `
                            <img
                                src="${previewUrl}"
                                class="rounded-circle w-100 h-100 object-fit-cover"
                                alt="프로필 이미지 미리보기"
                            >
                        `;
                    }
                });
            }

            let currentSection = "basic";
            let securityVerified = false;

            function reloadProfileEditSection(sectionType) {
                const safeKey = sections.includes(sectionType) ? sectionType : (currentSection || 'basic');
                window.location.href = `${window.location.pathname}?section=${encodeURIComponent(safeKey)}`;
            }

            window.reloadProfileEditSection = reloadProfileEditSection;

            async function verifySecurityAccessInline(){
                if (!profileState.loginId) {
                    alert('아이디 정보를 불러오지 못했습니다.');
                    return false;
                }

                const currentPassword = document.getElementById('securityPassword')?.value || "";
                const errorEl = document.getElementById('securityError');
                const verifyBtn = document.getElementById('btnSecurityVerify');

                if (!currentPassword) {
                    if (errorEl) {
                        errorEl.textContent = '현재 비밀번호를 입력하세요.';
                        errorEl.classList.remove('d-none');
                    }
                    return false;
                }

                try {
                    console.log('[비밀번호 검증] 요청 시작:', { username: profileState.loginId });
                    
                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: profileState.loginId, password: currentPassword }),
                        credentials: 'include'
                    });
                    
                    console.log('[비밀번호 검증] 응답 상태:', response.status);
                    
                    if (!response.ok && response.status !== 400 && response.status !== 401) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    
                    const result = await response.json();
                    console.log('[비밀번호 검증] 응답 데이터:', result);
                    
                    // success 필드 확인
                    const isSuccess = result?.success === true;
                    
                    if (!isSuccess) {
                        const errorMsg = result?.message || '비밀번호가 올바르지 않습니다.';
                        if (errorEl) {
                            errorEl.textContent = errorMsg;
                            errorEl.classList.remove('d-none');
                        }
                        if (verifyBtn) {
                            verifyBtn.disabled = false;
                            verifyBtn.innerHTML = '확인';
                        }
                        console.log('[비밀번호 검증] 실패:', errorMsg);
                        return false;
                    }

                    // 성공 - securityForm 표시
                    securityVerified = true;
                    const pwdInput = document.getElementById('securityPassword');
                    if (pwdInput) pwdInput.disabled = true;
                    if (verifyBtn) {
                        verifyBtn.disabled = true;
                        verifyBtn.innerHTML = '<i class="bi bi-check-circle me-1"></i> 확인 완료';
                        verifyBtn.classList.remove('btn-outline-primary');
                        verifyBtn.classList.add('btn-success');
                    }
                    if (errorEl) {
                        errorEl.classList.add('d-none');
                    }
                    
                    document.getElementById('securityGate')?.classList.add('d-none');
                    document.getElementById('securityForm')?.classList.remove('d-none');
                    console.log('[비밀번호 검증] 성공');
                    return true;
                } catch (error) {
                    console.error('[비밀번호 검증] 예외 발생:', error);
                    if (errorEl) {
                        errorEl.textContent = '비밀번호 확인 중 오류가 발생했습니다. 콘솔을 확인하세요.';
                        errorEl.classList.remove('d-none');
                    }
                    if (verifyBtn) {
                        verifyBtn.disabled = false;
                        verifyBtn.innerHTML = '확인';
                    }
                    return false;
                }
            }

            async function runEmbeddedScripts(root) {
                const scripts = Array.from(root.querySelectorAll('script'));
                for (const old of scripts) {
                    if (old.src) {
                        if (document.querySelector(`script[src="${old.src}"]`)) continue;
                        await new Promise((resolve, reject) => {
                        const s = document.createElement('script');
                        s.src = old.src;
                        s.async = false;
                        s.onload = resolve;
                        s.onerror = reject;
                        document.body.appendChild(s);
                        });
                    } else {
                        const s = document.createElement('script');
                        s.textContent = old.textContent;
                        document.body.appendChild(s);
                    }
                }
            }            

            async function flushSectionDraftBeforeLeave(nextSection) {
                if (currentSection === 'employment' && nextSection !== 'employment' && careerDirty) {
                    const ok = await saveCareersToApi(true);
                    if (!ok) return false;
                }

                if (currentSection === 'documents' && nextSection !== 'documents' && (educationDirty || degreeDirty)) {
                    const ok = await saveEducationsToApi(true);
                    if (!ok) return false;
                }

                return true;
            }

            async function showSection(key){
                const safeKey = sections.includes(key) ? key : "basic";
                const canLeave = await flushSectionDraftBeforeLeave(safeKey);
                if (!canLeave) return;

                collectSectionValues();

                document.querySelectorAll('.edit-menu .list-group-item').forEach(i => {
                    i.classList.toggle('active', i.dataset.section === safeKey);
                });

                const container = document.getElementById('profileEditContainer');
                if (!container) return;                

                try {
                    console.log(`[showSection] 요청 URL: /tutor/profile-edit/partial/${safeKey}`);
                    const res = await fetch(`/tutor/profile-edit/partial/${safeKey}`);
                    console.log(`[showSection] 응답 상태: ${res.status} ${res.statusText}`);
                    
                    if (!res.ok) {
                        const errorText = await res.text();
                        console.error(`[showSection] 응답 내용: ${errorText}`);
                        throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                    }
                    
                    const html = await res.text();
                    console.log(`[showSection] HTML 로드 성공 (${html.length} chars)`);
                    container.innerHTML = html;
                    await runEmbeddedScripts(container);
                    applyStateToSection();
                    bindSectionHandlers(safeKey);
                    currentSection = safeKey;
                } catch (e) {
                    console.error('[showSection] 오류 발생:', e);
                    container.innerHTML = `
                      <div class="card edit-card shadow-sm">
                        <div class="card-body">
                          <div class="panel-title mb-1">로딩 실패</div>
                          <div class="muted small">데이터를 불러오지 못했습니다.</div>

            async function saveSection(sectionType) {
                collectSectionValues();
                
                const formData = new FormData();
                
                // 섹션 유형에 따른 폼 데이터 설정
                switch(sectionType) {
                    case 'basic':
                        formData.set('name', profileState.name || '');
                        formData.set('phone', profileState.phone || '');
                        if (profileState.profileImgFile) {
                            formData.set('profileImg', profileState.profileImgFile);
                        }
                        break;
                        
                    case 'profile':
                        formData.set('headline', profileState.headline || '');
                        formData.set('bio', profileState.bio || '');
                        formData.set('selfIntro', profileState.selfIntro || '');
                        formData.set('videoUrl', profileState.videoUrl || '');
                        break;                        
                    
                    case 'account':
                        formData.set('bankName', profileState.bankName || '');
                        formData.set('accountNumber', profileState.accountNumber || '');
                        formData.set('accountHolder', profileState.accountHolder || '');
                        break;

                    case 'zoom':
                        formData.set('defaultZoomUrl', profileState.defaultZoomUrl || '');
                        break;

                    case 'documents':
                        // 파일 업로드: 학력증명서, 학위증명서, 자격증
                        const eduFiles = document.getElementById('editDocEducation')?.files || [];
                        const degFiles = document.getElementById('editDocDegree')?.files || [];
                        const certFiles = document.getElementById('editDocCertificate')?.files || [];
                        for (const file of eduFiles) {
                            formData.append('docEducation', file);
                        }
                        for (const file of degFiles) {
                            formData.append('docDegree', file);
                        }
                        for (const file of certFiles) {
                            formData.append('docCertificate', file);
                        }
                        break;
                        
                    case 'security':
                        // 보안 탭 접근 확인
                        if (!securityVerified) {
                            alert('현재 비밀번호를 먼저 확인해주세요.');
                            return;
                        }
                        
                        if (profileState.password) {
                            // 현재 비밀번호와 새 비밀번호 비교
                            const currentPassword = document.getElementById('securityPassword')?.value || "";
                            if (currentPassword === profileState.password) {
                                alert('현재 비밀번호와 같습니다');
                                return;
                            }
                            
                            if (profileState.password !== profileState.passwordConfirm) {
                                alert('비밀번호가 일치하지 않습니다.');
                                return;
                            }
                            const passwordCheck = /^(?=.*[!@#$%^&*])[A-Za-z0-9!@#$%^&*]{6,}$/;
                            if (!passwordCheck.test(profileState.password)) {
                                alert('비밀번호는 6자 이상이며 특수문자를 1개 이상 포함해야 합니다.');
                                return;
                            }
                            formData.set('password', profileState.password);
                            formData.set('passwordConfirm', profileState.passwordConfirm);
                        } else {
                            alert('새 비밀번호를 입력해주세요.');
                            return;
                        }
                        break; 
                        
                    default:
                        console.error('알 수 없는 섹션 유형', sectionType);
                        return;
                }
                
                try {
                    const response = await fetchWithAuth('/api/tutors', {
                        method: 'PUT',
                        body: formData
                    });
                    
                    const result = await response.json();
                    const sectionNames = {
                        basic: '기본 정보',
                        profile: '프로필',
                        account: '계좌 정보',
                        zoom: 'Zoom 연동',
                        security: '보안 설정'
                    };
                    if (result.success) {
                        // 저장 완료
                        alert(`${sectionNames[sectionType] || '섹션'}이(가) 저장되었습니다.`);
                        reloadProfileEditSection(sectionType);
                        return;
                    } else {
                        alert(result.message || `${sectionNames[sectionType] || '섹션'} 저장에 실패했습니다.`);
                    }
                } catch (error) {
                    console.error('섹션 저장 실패:', error);
                    alert('섹션 저장 중 오류가 발생했습니다.');
                }
            }

            function formatFileSize(bytes) {
                if (!Number.isFinite(bytes)) return '';
                if (bytes < 1024) return `${bytes}B`;
                if (bytes < (1024 * 1024)) return `${(bytes / 1024).toFixed(1)}KB`;
                return `${(bytes / (1024 * 1024)).toFixed(1)}MB`;
            }

            function parseCertificateText(displayName) {
                const value = String(displayName || '').trim();
                const match = value.match(/^(.*)\((.*)\)$/);
                if (!match) {
                    return { name: value, issuer: '' };
                }
                return {
                    name: match[1].trim(),
                    issuer: match[2].trim()
                };
            }

            function buildCareerPayload() {
                return ( documentDraft.careers || [] )
                    .map( (item) => ({
                        companyName: (item.companyName || '').trim(),
                        jobCategory: (item.jobCategory || '').trim(),
                        jobRole: (item.jobRole || '').trim(),
                        startYear: item.startYear ? Number(item.startYear) : null,
                        endYear: item.endYear ? Number(item.endYear) : null,
                    }))
                    .filter( (item) => item.companyName && item.startYear );
            }

            function buildEducationPayload() {
                const payload = [];
                const maxLen = Math.max(
                    documentDraft.educations.length,
                    documentDraft.degrees.length
                );

                const nowYear = new Date().getFullYear();

                for ( let i = 0; i < maxLen; i++ ) {
                    const edu = documentDraft.educations[i] || {};
                    const deg = documentDraft.degrees[i] || {};

                    const schoolName = (edu.schoolName || '').trim();
                    const degreeName = (deg.degreeName || '').trim();
                    const major = (deg.major || '').trim();

                    const degree = degreeName && major ? `${degreeName} (${major})` : (degreeName || major || '');

                    if ( !schoolName && !degree ) continue;

                    payload.push({
                        schoolName: schoolName || '학위 정보',
                        degree: degree || '학위 미입력',
                        startYear: Number( edu.startYear || edu.graduatedYear || nowYear ),
                        graduatedYear: edu.graduatedYear ? Number(edu.graduatedYear) : null,
                    });

                }

                return payload;

            }

            async function loadEducationsFromApi() {
                if (educationsInitialized) {
                    renderEducationCards();
                    renderDegreeCards();
                    return;
                }

                const res = await fetchWithAuth('/api/tutors/educations');
                const result = await res.json().catch(() => ({ success: false, data: [] }));
                if (!(res.ok && result.success)) {
                    alert(result.message || '학력/학위 조회에 실패했습니다.');
                    return;
                }

                const rows = result.data || [];
                documentDraft.educations = rows.map((item) => ({
                    schoolName: item.schoolName || '',
                    startYear: item.startYear || null,
                    graduatedYear: item.graduatedYear || null
                }));

                documentDraft.degrees = rows.map((item) => {
                    const raw = String(item.degree || '').trim();
                    const m = raw.match(/^(.*)\((.*)\)$/);
                    if (m) return { degreeName: m[1].trim(), major: m[2].trim() };
                    return { degreeName: raw, major: '' };
                });

                educationsInitialized = true;
                educationDirty = false;
                degreeDirty = false;
                renderEducationCards();
                renderDegreeCards();
            }

                listEl.innerHTML = '';

                    deleteBtn.className = 'btn btn-sm btn-outline-danger';

            function bindDocumentInput(inputId, draftKey, listId, cardId) {
                const input = document.getElementById(inputId);
                if (!input) return;

                input.addEventListener('change', () => {
                    const files = Array.from(input.files || []);
                    if (files.length === 0) return;

                    const replaceIndex = Number(input.dataset.replaceIndex);
                    if (Number.isInteger(replaceIndex) && replaceIndex >= 0 && replaceIndex < documentDraft[draftKey].length) {
                        documentDraft[draftKey].splice(replaceIndex, 1, files[0]);
                        if (files.length > 1) {
                            documentDraft[draftKey].splice(replaceIndex + 1, 0, ...files.slice(1));
                        }
                    } else {
                        documentDraft[draftKey].push(...files);
                    }

                    delete input.dataset.replaceIndex;
                    input.value = '';
                    renderPendingFileList(listId, cardId, documentDraft[draftKey], inputId, draftKey);
                });
            }

            async function uploadDocs(docType, files) {

                    const res = await fetchWithAuth('/api/tutors/documents', {
                        method: 'POST',
                        body: fd
                    });
                    const result = await res.json();
                    if (!(res.ok && result.success)) {
                        throw new Error(result?.message || '문서 업로드에 실패했습니다.');
                    }
                }
            }

            async function saveCertificateTexts() {
                const res = await fetchWithAuth('/api/tutors/documents/certificate-texts', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(documentDraft.certificateTexts)
                });
                const result = await res.json();
                if (!(res.ok && result.success)) {
                    throw new Error(result?.message || '자격증 텍스트 저장에 실패했습니다.');
                }
            }

            function resetPendingDocumentFiles() {
                documentDraft.educationFiles = [];
                documentDraft.degreeFiles = [];
                documentDraft.certificateFiles = [];
                renderPendingFileList('academicList', 'academicListCard', documentDraft.educationFiles, 'editDocEducation', 'educationFiles');
                renderPendingFileList('educationList', 'educationListCard', documentDraft.degreeFiles, 'educationCertificate', 'degreeFiles');
                renderPendingFileList('certificateFileList', 'certificateFileListCard', documentDraft.certificateFiles, 'certificateFiles', 'certificateFiles');
            }

            async function loadDocumentList() {
                const listEl = document.getElementById('docList');

                const res = await fetchWithAuth('/api/tutors/documents');
                if (!res.ok) {
                    if (listEl) {
                        listEl.innerHTML = '<tr><td colspan=\"4\" class=\"text-muted\">목록을 불러오지 못했습니다.</td></tr>';
                    }
                    return;
                }
                
                const result = await res.json();
                const docs = (result && result.data) || [];

                if (!documentTextsInitialized) {
                    const texts = docs
                        .filter((d) => d.docType === 'CERTIFICATE_TEXT')
                        .map((d) => parseCertificateText(d.originalName))
                        .filter((d) => d.name);
                    documentDraft.certificateTexts = texts;
                    documentTextsInitialized = true;
                    certificateTextsDirty = false;
                    renderCertificateTextCards();
                }

                if (!listEl) return;

                const typeLabel = {
                    EDUCATION: '학력',
                    DEGREE: '학위',
                    CERTIFICATE: '자격증',
                    CERTIFICATE_TEXT: '자격증(텍스트)'
                };

                if (docs.length === 0) {
                    listEl.innerHTML = '<tr><td colspan=\"4\" class=\"text-muted\">저장된 서류가 없습니다.</td></tr>';
                    return;
                }

                listEl.innerHTML = docs.map((d) => `
                  <tr>
                    <td>${typeLabel[d.docType] || d.docType}</td>
                    <td>${d.originalName || '-'}</td>
                    <td class="muted">${d.createdAt ? d.createdAt.substring(0, 10) : ''}</td>
                    <td>${d.reviewedAt ? '검토 완료' : '대기'}</td>
                  </tr>
                `).join('');

            }

            async function initEmploymentSection() {
                await loadCareersFromApi();

                renderCareerCards();

                document.getElementById('btnAddCareer')?.addEventListener('click', () => {
                    const companyName = document.getElementById('careerCompany')?.value.trim() || '';
                    const jobCategory = document.getElementById('careerJob')?.value.trim() || '';
                    const jobRole = document.getElementById('careerPosition')?.value.trim() || '';
                    const startYearRaw = document.getElementById('careerStartYear')?.value.trim() || '';
                    const endYearRaw = document.getElementById('careerEndYear')?.value.trim() || '';

                    if ( !companyName ) {
                        alert('회사명을 입력해주세요.');
                        return;
                    }

                    if ( !startYearRaw ) {
                        alert('입사년도를 입력해주세요.');
                        return;
                    }

                    documentDraft.careers.push({
                        companyName,
                        jobCategory,
                        jobRole,
                        startYear: Number(startYearRaw),
                        endYear: endYearRaw ? Number(endYearRaw) : null
                    });

                    careerDirty = true;
                    renderCareerCards();

                    document.getElementById('careerCompany').value = '';
                    document.getElementById('careerJob').value = '';
                    document.getElementById('careerPosition').value = '';
                    document.getElementById('careerStartYear').value = '';
                    document.getElementById('careerEndYear').value = '';
                });

                const uploadBtn = document.getElementById('btnEmploymentUpload');
                const input = document.getElementById('editDocEmployment');

                if ( uploadBtn && input ) {

                    input.addEventListener('change', () => {
                        const files = Array.from(input.files || []);
                        if (files.length === 0) return;
    
                        documentDraft.employmentFiles = files;
                        input.value = '';
                    });
    
                    uploadBtn.addEventListener('click', async () => {
                        if (documentDraft.employmentFiles.length === 0) {
                            alert('업로드할 파일을 선택해주세요.');
                            return;
                        }
    
                        try {
                            await uploadDocs('EMPLOYMENT', documentDraft.employmentFiles);
                            documentDraft.employmentFiles = [];
                            alert('재직증명서가 업로드되었습니다.');
                            await loadDocumentList();
                        } catch (e) {
                            console.error(e);
                            alert(e.message || '재직증명서 업로드 중 오류가 발생했습니다.');
                        }
                    });
                }
            }

            async function initDocumentSection() {
                const uploadBtn = document.getElementById('btnDocUpload');

                if (!uploadBtn) return;

                await loadEducationsFromApi();

                bindDocumentInput('editDocEducation', 'educationFiles', 'academicList', 'academicListCard');
                bindDocumentInput('educationCertificate', 'degreeFiles', 'educationList', 'educationListCard');
                bindDocumentInput('certificateFiles', 'certificateFiles', 'certificateFileList', 'certificateFileListCard');

                renderPendingFileList('academicList', 'academicListCard', documentDraft.educationFiles, 'editDocEducation', 'educationFiles');
                renderPendingFileList('educationList', 'educationListCard', documentDraft.degreeFiles, 'educationCertificate', 'degreeFiles');
                renderPendingFileList('certificateFileList', 'certificateFileListCard', documentDraft.certificateFiles, 'certificateFiles', 'certificateFiles');
                renderCertificateTextCards();

                renderEducationCards();
                renderDegreeCards();

                document.getElementById('btnAddEducation')?.addEventListener('click', () => {
                    const schoolName = document.getElementById('educationSchoolName')?.value.trim() || '';
                    const startYearRaw = document.getElementById('educationStartYear')?.value.trim() || '';
                    const graduatedYearRaw = document.getElementById('educationGraduatedYear')?.value.trim() || '';

                    if ( !schoolName ) {
                        alert('학교명을 입력해주세요.');
                        return;
                    }

                    if ( !startYearRaw ) {
                        alert('입학년도를 입력해주세요.');
                        return;
                    }

                    documentDraft.educations.push({
                        schoolName,
                        startYear: Number(startYearRaw),
                        graduatedYear: graduatedYearRaw ? Number(graduatedYearRaw) : null
                    });

                    educationDirty = true;
                    renderEducationCards();

                    document.getElementById('educationSchoolName').value = '';
                    document.getElementById('educationStartYear').value = '';
                    document.getElementById('educationGraduatedYear').value = '';

                });

                document.getElementById('btnAddDegree')?.addEventListener('click', () => {
                    const degreeName = document.getElementById('degreeName')?.value.trim() || '';
                    const major = document.getElementById('degreeMajor')?.value.trim() || '';

                    if ( !degreeName ) {
                        alert('학위명을 입력해주세요.');
                        return;
                    }

                    documentDraft.degrees.push({
                        degreeName,
                        major
                    });

                    degreeDirty = true;
                    renderDegreeCards();

                    document.getElementById('degreeName').value = '';
                    document.getElementById('degreeMajor').value = '';

                });

                document.getElementById('btnAddCertificateText')?.addEventListener('click', () => {
                    const nameInput = document.getElementById('certificateName');
                    const issuerInput = document.getElementById('certificateIssuer');
                    if (!nameInput || !issuerInput) return;

                    const name = nameInput.value.trim();
                    const issuer = issuerInput.value.trim();
                    if (!name) {
                        alert('자격증명을 입력해주세요.');
                        return;
                    }

                    documentDraft.certificateTexts.push({ name, issuer });
                    certificateTextsDirty = true;
                    renderCertificateTextCards();
                    nameInput.value = '';
                    issuerInput.value = '';
                });

                uploadBtn.addEventListener('click', async () => {
                    const hasFiles =
                        documentDraft.educationFiles.length > 0 ||
                        documentDraft.degreeFiles.length > 0 ||
                        documentDraft.certificateFiles.length > 0;
                    const hasEduChanges = educationDirty || degreeDirty;

                    if (!hasFiles && !certificateTextsDirty && !hasEduChanges) {
                        alert('변경된 내용이 없습니다.');
                        return;
                    }

                    try {
                        if (hasEduChanges) {
                            const ok = await saveEducationsToApi(false);
                            if (!ok) return;
                        }

                        if (hasFiles) {
                            await uploadDocs('EDUCATION', documentDraft.educationFiles);
                            await uploadDocs('DEGREE', documentDraft.degreeFiles);
                            await uploadDocs('CERTIFICATE', documentDraft.certificateFiles);
                            resetPendingDocumentFiles();
                        }

                        if (certificateTextsDirty) {
                            await saveCertificateTexts();
                            certificateTextsDirty = false;
                        }

                        documentTextsInitialized = false;
                        alert('서류 정보가 저장되었습니다.');
                        reloadProfileEditSection('documents');
                        return;
                    } catch (e) {
                        console.error(e);
                        alert(e.message || '서류 저장 중 오류가 발생했습니다.');
                    }
                });

                await loadDocumentList();
            }

            // 최초 섹션
            const initial = new URLSearchParams(location.search).get('section') || 'basic';
            showSection(sections.includes(initial) ? initial : 'basic');
        </script>
    </div>
</div>
