<div xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/main_layout}">

    <th:block layout:fragment="extra-css">
    <link rel="stylesheet" href="/css/tutor-register-admin.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: #f8fafc; }
        .edit-shell { display: flex; gap: 24px; }
        .edit-sidebar { width: 280px; flex: 0 0 280px; position: sticky; top: 90px; height: fit-content; }
        .edit-card { border-radius: 16px; border: 1px solid #e5e7eb; }
        .edit-menu .list-group-item { border: 0; border-radius: 12px; padding: 12px 14px; color: #334155; cursor: pointer; }
        .edit-menu .list-group-item.active { background: #2563eb; color: #fff; }
        .edit-menu .list-group-item:hover:not(.active) { background: #f1f5f9; }
        .panel-title { font-weight: 800; }
        .muted { color: #64748b; }
        .divider { height: 1px; background: #e5e7eb; margin: 14px 0; }
        .form-label { font-weight: 600; color: #334155; }
        .btn-pill { border-radius: 999px; }
        
        @media (max-width: 992px) {
            .edit-shell { flex-direction: column; }
            .edit-sidebar { width: 100%; position: static; }
        }
    </style>
    </th:block>

    <div layout:fragment="content">
        <div class="container py-4">
            <!-- 헤더 -->
            <div class="d-flex justify-content-between align-items-end mb-4">
                <div>                    
                    <h2 class="fw-bold mb-1">프로필 수정</h2>
                    <div class="muted small">회원 정보를 수정하세요</div>
                </div>
                <div class="d-flex gap-2">
                    <a href="/member/mypage" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-1"></i> 마이페이지로
                    </a>
                </div>
            </div>

            <div class="edit-shell">
                <!-- 사이드바 -->
                <aside class="edit-sidebar">
                    <div class="card edit-card shadow-sm">
                        <div class="card-body p-3">  
                            <div class="d-flex align-items-center gap-3 mb-3">
                                <div id="sidebarProfileImg" class="rounded-circle bg-info text-white d-flex align-items-center justify-content-center" style="width:60px;height:60px;font-size:1.5rem;">
                                    <span class="fs-4">👤</span>
                                </div>
                                <div>
                                    <div class="fw-bold" id="sidebarName">회원</div>
                                    <div class="muted small" id="sidebarLoginId">아이디</div>
                                </div>
                            </div>

                            <div class="divider"></div>

                            <div class="list-group edit-menu">
                                <div class="list-group-item active" data-section="basic">
                                    <i class="bi bi-person me-2"></i> 기본 정보
                                </div>
                                <div class="list-group-item" data-section="security">
                                    <i class="bi bi-shield-lock me-2"></i> 보안
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card edit-card shadow-sm mt-3">
                        <div class="card-body p-3">
                            <div class="small text-muted">
                                <i class="bi bi-info-circle me-1"></i> 
                                정보 수정 후 각 섹션의 저장 버튼을 눌러주세요.
                            </div>
                        </div>
                    </div>
                </aside>

                <!-- 메인 컨텐츠 -->
                <main class="flex-grow-1">
                    <form id="profileEditForm">
                        <div id="profileEditContainer"></div>
                    </form>
                </main>
            </div>
        </div>

        <script>
            const getFallbackToken = () => localStorage.getItem('accessToken');
            const getAuthHeaders = () => {
                if (typeof buildAuthHeaders === 'function') {
                    return buildAuthHeaders();
                }
                const token = getFallbackToken();
                return token ? { 'Authorization': `Bearer ${token}` } : {};
            };

            async function ensureAuth() {
                const token = (typeof getAccessToken === 'function') ? getAccessToken() : getFallbackToken();
                if (token) return true;
                if (typeof refreshAccessToken === 'function') {
                    return await refreshAccessToken();
                }
                return false;
            }

            async function fetchWithAuth(url, options = {}) {
                const headers = { ...(options.headers || {}), ...getAuthHeaders() };
                const response = await fetch(url, {
                    ...options,
                    headers,
                    credentials: 'include'
                });

                if (response.status === 401 && typeof refreshAccessToken === 'function') {
                    const refreshed = await refreshAccessToken();
                    if (refreshed) {
                        const newHeaders = { ...(options.headers || {}), ...getAuthHeaders() };
                        return fetch(url, {
                            ...options,
                            headers: newHeaders,
                            credentials: 'include'
                        });
                    }
                }

                return response;
            }

            const sections = ["basic", "security"];
            const profileState = {
                loginId: "",
                username: "",
                nickname: "",
                name: "",               
                password: "",
                passwordConfirm: "",
                profileImgFile: null,
                profileImgUrl: ""
            };

            function collectSectionValues(){
                if (document.getElementById('editUsername')) profileState.username = document.getElementById('editUsername').value || "";
                if (document.getElementById('editNickname')) profileState.nickname = document.getElementById('editNickname').value || "";
                if (document.getElementById('editName')) profileState.name = document.getElementById('editName').value || "";                
                if (document.getElementById('editPassword')) profileState.password = document.getElementById('editPassword').value || "";
                if (document.getElementById('editPasswordConfirm')) profileState.passwordConfirm = document.getElementById('editPasswordConfirm').value || "";

                const profileImgInput = document.getElementById('editProfileImg');
                if (profileImgInput && profileImgInput.files[0]) {
                    profileState.profileImgFile = profileImgInput.files[0];
                }
            }

            function applyStateToSection(){
                const elements = {
                    editUsername: document.getElementById('editUsername'),
                    editNickname: document.getElementById('editNickname'),
                    editName: document.getElementById('editName'),                    
                    currentProfileImg: document.getElementById('currentProfileImg')
                };

                // 안전하게 값 설정
                if (elements.editUsername) elements.editUsername.value = profileState.username || "";
                if (elements.editNickname) elements.editNickname.value = profileState.nickname || "";
                if (elements.editName) elements.editName.value = profileState.name || "";
                
                // 프로필 이미지 처리
                if (elements.currentProfileImg && profileState.profileImgUrl) {
                    elements.currentProfileImg.classList.remove('bg-info');
                    elements.currentProfileImg.innerHTML =
                        `<img src="${profileState.profileImgUrl}" class="rounded-circle w-100 h-100 object-fit-cover" alt="프로필">`;
                } else if (elements.currentProfileImg) {
                    elements.currentProfileImg.classList.add('bg-info');
                    elements.currentProfileImg.innerHTML = `
                        <span class="fs-4">👤</span>
                    `;
                } 
            }

            console.log('profileState 초기값:', profileState);

            // 프로필 이미지 변경 미리보기
            function bindProfileImagePreview() {
                const profileImgInput = document.getElementById('editProfileImg');
                const currentProfileImg = document.getElementById('currentProfileImg');                
                
                if (!profileImgInput || !currentProfileImg) return;               

                profileImgInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (!file) return;

                    // 상태 저장 (submit 때 사용)
                    profileState.profileImgFile = file;

                    // 미리보기 URL 생성
                    const previewUrl = URL.createObjectURL(file);

                    // 🔥 currentProfileImg 안에 img가 있는지 확인
                    const imgEl = currentProfileImg.querySelector('img');

                    if (imgEl) {
                        // ✅ 이미 이미지가 있으면 src만 교체
                        imgEl.src = previewUrl;
                    } else {
                        // ✅ 이미지가 없으면 (이모지 상태)
                        currentProfileImg.classList.remove('bg-info');
                        currentProfileImg.innerHTML = `
                            <img
                                src="${previewUrl}"
                                class="rounded-circle w-100 h-100 object-fit-cover"
                                alt="프로필 이미지 미리보기"
                            >
                        `;
                    }
                });
            }

            let currentSection = "basic";
            let securityVerified = false;

            async function verifySecurityAccessInline(){
                if (!profileState.loginId) {
                    alert('아이디 정보를 불러올 수 없습니다.');
                    return false;
                }

                const currentPassword = document.getElementById('securityPassword')?.value || "";
                const errorEl = document.getElementById('securityError');
                const verifyBtn = document.getElementById('btnSecurityVerify');
                
                if (!currentPassword) {
                    if (errorEl) {
                        errorEl.textContent = '현재 비밀번호를 입력하세요.';
                        errorEl.classList.remove('d-none');
                    }
                    return false;
                }

                // 버튼 로딩 상태
                if (verifyBtn) {
                    verifyBtn.disabled = true;
                    verifyBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> 확인 중...';
                }

                try {
                    console.log('[비밀번호 검증] 요청 시작:', { username: profileState.loginId });
                    
                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: profileState.loginId, password: currentPassword }),
                        credentials: 'include'
                    });
                    
                    console.log('[비밀번호 검증] 응답 상태:', response.status);
                    
                    if (!response.ok && response.status !== 400 && response.status !== 401) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    
                    const result = await response.json();
                    console.log('[비밀번호 검증] 응답 데이터:', result);
                    
                    // success 필드 확인
                    const isSuccess = result?.success === true;
                    
                    if (!isSuccess) {
                        const errorMsg = result?.message || '비밀번호가 올바르지 않습니다.';
                        if (errorEl) {
                            errorEl.textContent = errorMsg;
                            errorEl.classList.remove('d-none');
                        }
                        if (verifyBtn) {
                            verifyBtn.disabled = false;
                            verifyBtn.innerHTML = '확인';
                        }
                        console.log('[비밀번호 검증] 실패:', errorMsg);
                        return false;
                    }

                    // 성공 - securityForm 표시
                    securityVerified = true;
                    const pwdInput = document.getElementById('securityPassword');
                    if (pwdInput) pwdInput.disabled = true;
                    if (verifyBtn) {
                        verifyBtn.disabled = true;
                        verifyBtn.innerHTML = '<i class="bi bi-check-circle me-1"></i> 확인 완료';
                        verifyBtn.classList.remove('btn-outline-primary');
                        verifyBtn.classList.add('btn-success');
                    }
                    if (errorEl) {
                        errorEl.classList.add('d-none');
                    }
                    
                    document.getElementById('securityGate')?.classList.add('d-none');
                    document.getElementById('securityForm')?.classList.remove('d-none');
                    console.log('[비밀번호 검증] 성공');
                    return true;
                } catch (error) {
                    console.error('[비밀번호 검증] 예외 발생:', error);
                    if (errorEl) {
                        errorEl.textContent = '비밀번호 확인 중 오류가 발생했습니다. 콘솔을 확인하세요.';
                        errorEl.classList.remove('d-none');
                    }
                    if (verifyBtn) {
                        verifyBtn.disabled = false;
                        verifyBtn.innerHTML = '확인';
                    }
                    return false;
                }
            }

            async function runEmbeddedScripts(root) {
                const scripts = Array.from(root.querySelectorAll('script'));
                for (const old of scripts) {
                    if (old.src) {
                        if (document.querySelector(`script[src="${old.src}"]`)) continue;
                        await new Promise((resolve, reject) => {
                        const s = document.createElement('script');
                        s.src = old.src;
                        s.async = false;
                        s.onload = resolve;
                        s.onerror = reject;
                        document.body.appendChild(s);
                        });
                    } else {
                        const s = document.createElement('script');
                        s.textContent = old.textContent;
                        document.body.appendChild(s);
                    }
                }
            }

            async function showSection(key){
                const safeKey = sections.includes(key) ? key : "basic";
                collectSectionValues();

                document.querySelectorAll('.edit-menu .list-group-item').forEach(i => {
                    i.classList.toggle('active', i.dataset.section === safeKey);
                });

                const container = document.getElementById('profileEditContainer');
                if (!container) return; 

                try {
                    console.log(`[showSection] 요청 URL: /member/profile-edit/partial/${safeKey}`);
                    const res = await fetch(`/member/profile-edit/partial/${safeKey}`);
                    console.log(`[showSection] 응답 상태: ${res.status} ${res.statusText}`);
                    
                    if (!res.ok) {
                        const errorText = await res.text();
                        console.error(`[showSection] 응답 내용: ${errorText}`);
                        throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                    }
                    
                    const html = await res.text();
                    console.log(`[showSection] HTML 로드 성공 (${html.length} chars)`);
                    container.innerHTML = html;
                    await runEmbeddedScripts(container);
                    applyStateToSection();
                    bindSectionHandlers(safeKey);
                    currentSection = safeKey;
                } catch (e) {
                    console.error('[showSection] 에러 발생:', e);
                    container.innerHTML = `
                      <div class="card edit-card shadow-sm">
                        <div class="card-body">
                          <div class="panel-title mb-1">불러오기 실패</div>
                          <div class="muted small">잠시 후 다시 시도해주세요.</div>
                          <div class="text-danger small mt-2">에러: ${e.message}</div>
                        </div>
                      </div>
                    `;
                }
            }

            function bindSectionHandlers(key){
                if (key === "basic") {
                    bindProfileImagePreview();
                }
                if (key === "security") {
                    initSecuritySection();
                }
            }

            function initSecuritySection(){
                const gate = document.getElementById('securityGate');
                const form = document.getElementById('securityForm');
                const verifyBtn = document.getElementById('btnSecurityVerify');
                const passwordInput = document.getElementById('securityPassword');
                const errorEl = document.getElementById('securityError');
                
                if (!gate || !form) return;

                // 상태에 따라 UI 설정
                if (securityVerified) {
                    gate.classList.add('d-none');
                    form.classList.remove('d-none');
                } else {
                    gate.classList.remove('d-none');
                    form.classList.add('d-none');
                    
                    // 에러 메시지 초기화
                    if (errorEl) {
                        errorEl.classList.add('d-none');
                        errorEl.textContent = '';
                    }
                }

                // 확인 버튼 클릭 이벤트
                if (verifyBtn) {
                    verifyBtn.addEventListener('click', async () => {
                        await verifySecurityAccessInline();
                    });
                }

                // Enter 키 지원
                if (passwordInput) {
                    passwordInput.addEventListener('keydown', async (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            await verifySecurityAccessInline();
                        }
                    });
                    
                    // 입력 시 에러 메시지 숨김
                    passwordInput.addEventListener('input', () => {
                        if (errorEl) {
                            errorEl.classList.add('d-none');
                        }
                    });
                }
            }

            // 섹션 전환
            document.querySelectorAll('.edit-menu .list-group-item').forEach(item => {
                item.addEventListener('click', () => {
                    showSection(item.dataset.section);
                });
            });

            // 페이지 로드 시 데이터 바인딩
            document.addEventListener('DOMContentLoaded', async function() {

                try {
                    const authed = await ensureAuth();
                    if (!authed) {
                        console.warn('인증되지 않았습니다.');
                        location.href = '/login';
                        return;
                    }

                    const response = await fetchWithAuth('/api/users/me');
                    if (!response.ok) throw new Error('Failed to fetch');

                    const result = await response.json();
                    if (result.success && result.data) {
                        const profile = result.data;
                        if (profile) {
                            console.log('프로필 정보:', profile);
                            
                            // 사이드바
                            document.getElementById('sidebarName').textContent = profile.name || '회원';
                            document.getElementById('sidebarLoginId').textContent = profile.username || '';
                            if (profile.profileImg) {
                                document.getElementById('sidebarProfileImg').classList.remove('bg-info');
                                document.getElementById('sidebarProfileImg').innerHTML = 
                                    `<img src="${profile.profileImg}" class="rounded-circle w-100 h-100 object-fit-cover" alt="프로필">`;
                                profileState.profileImgUrl = profile.profileImg;
                            }else {
                                document.getElementById('sidebarProfileImg').classList.add('bg-info');
                                document.getElementById('sidebarProfileImg').innerHTML = `
                                    <span class="fs-4">👤</span>
                                `;
                            }

                            // 상태 저장
                            profileState.loginId = profile.username || '';
                            profileState.username = profile.username || '';
                            profileState.nickname = profile.nickname || '';
                            profileState.name = profile.name || '';                          

                            console.log('profileState 업데이트:', profileState);
                            applyStateToSection(); 
                        }
                    }                    
                } catch (e) {
                    console.error('프로필 데이터 로드 실패', e);                    
                }
            });

            // 섹션별 저장 함수
            async function saveSection(sectionType) {
                collectSectionValues();

                const formData = new FormData();

                // 섹션별로 필요한 데이터만 추가
                switch(sectionType) {
                    case 'basic':
                        formData.set('name', profileState.name || '');
                        if (profileState.profileImgFile) {
                            formData.set('profileImg', profileState.profileImgFile);
                        }
                        break;     

                    case 'security':
                        // 보안 탭 접근 확인
                        if (!securityVerified) {
                            alert('현재 비밀번호를 먼저 확인해주세요.');
                            return;
                        }
                        
                        if (profileState.password) {
                            // 현재 비밀번호와 새 비밀번호 비교
                            const currentPassword = document.getElementById('securityPassword')?.value || "";
                            if (currentPassword === profileState.password) {
                                alert('현재 비밀번호와 같습니다');
                                return;
                            }
                            
                            if (profileState.password !== profileState.passwordConfirm) {
                                alert('비밀번호가 일치하지 않습니다.');
                                return;
                            }
                            const passwordCheck = /^(?=.*[!@#$%^&*])[A-Za-z0-9!@#$%^&*]{6,}$/;
                            if (!passwordCheck.test(profileState.password)) {
                                alert('비밀번호는 6자 이상이며 특수문자를 1개 이상 포함해야 합니다.');
                                return;
                            }
                            formData.set('password', profileState.password);
                            formData.set('passwordConfirm', profileState.passwordConfirm);
                        } else {
                            alert('새 비밀번호를 입력해주세요.');
                            return;
                        }
                        break; 
                     
                    default:
                        console.error('알 수 없는 섹션 타입:', sectionType);
                        return;
                } 

                try {
                    const response = await fetchWithAuth('/api/users', {
                        method: 'PUT',
                        body: formData
                    });
                    
                    const result = await response.json();
                    if (result.success) {
                        // 성공 메시지
                        const sectionNames = {
                            'basic': '기본 정보',                            
                            'security': '보안 설정'
                        };
                        alert(`${sectionNames[sectionType] || '섹션'}이(가) 저장되었습니다.`);
                        
                        // 보안 섹션 저장 후 마이페이지로 이동
                        if (sectionType === 'security') {
                            location.href = '/member/mypage';
                            return;
                        }
                        
                        // 사이드바 프로필 이미지 업데이트 (basic 섹션 저장 시)
                        if (sectionType === 'basic' && profileState.profileImgFile) {
                            const previewUrl = URL.createObjectURL(profileState.profileImgFile);
                            const sidebarProfileImg = document.getElementById('sidebarProfileImg');
                            if (sidebarProfileImg) {
                                sidebarProfileImg.classList.remove('bg-info');
                                sidebarProfileImg.innerHTML = `<img src="${previewUrl}" class="rounded-circle w-100 h-100 object-fit-cover" alt="프로필">`;
                            }
                        } 
                        
                    } else {
                        alert(result.message || `${sectionType} 섹션 저장에 실패했습니다.`);
                    }
                } catch (error) {
                    console.error('섹션 저장 실패:', error);
                    alert('저장 중 오류가 발생했습니다.');
                }   
            }
            // 최초 섹션
            const initial = new URLSearchParams(location.search).get('section') || 'basic';
            showSection(sections.includes(initial) ? initial : 'basic');
        </script>
    </div>
</div>
