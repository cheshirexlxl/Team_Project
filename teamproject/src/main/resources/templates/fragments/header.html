<th:block th:fragment="header">
    <header class="navbar">
        <div class="navbar-container">
            <a class="navbar-logo" href="/">
                <img src="/img/logo.png" alt="투코스 로고" style="height: 36px;">
            </a>

            <!-- 중앙 네비게이션 (데스크탑) -->
            <nav class="navbar-menu d-none d-md-flex gap-5">
                <a href="/" class="text-decoration-none text-dark fw-semibold">홈</a>
                <a href="/tutors" class="text-decoration-none text-dark fw-semibold">튜터 찾기</a>
                <a href="/game/korean" class="text-decoration-none text-dark fw-semibold">한국어게임</a>
                <a href="/guide/language" class="text-decoration-none text-dark fw-semibold">세계인들의 언어</a>
            </nav>

            <!-- 오른쪽 버튼 영역 -->
            <div class="navbar-right">
                <!-- 로그인 전 -->
                <div id="navGuestArea" class="gap-2" style="display: flex;">
                    <button class="btn btn-sm btn-outline-secondary rounded-pill px-3 nav-action-btn" onclick="location.href='/login'">로그인</button>

                <div id="navUserArea" class="gap-2" style="display: none;">
                    <button id="navUserMyPageBtn" class="btn btn-sm btn-outline-primary rounded-pill px-3 nav-action-btn" onclick="location.href='/member/mypage'">

                    </button>
                    <button id="navTutorDashboardBtn" class="btn btn-sm btn-outline-primary rounded-pill px-3 nav-action-btn" onclick="location.href='/tutor/dashboard'" style="display: none;">

                    </button>
                    <button id="navTutorMyPageBtn" class="btn btn-sm btn-outline-primary rounded-pill px-3 nav-action-btn" onclick="location.href='/tutor/mypage'" style="display: none;">

                    </button>
                    <button id="navLogoutBtn" class="btn btn-sm btn-outline-dark rounded-pill px-3 nav-action-btn">
