<section class="admin-tab">
  <div class="row g-3">
    <div class="col-lg-7">
      <div class="card admin-card shadow-sm">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <div>
              <div class="panel-title">최근 서류 제출</div>
              <div class="muted small">대기/승인/반려 현황을 확인하세요.</div>
            </div>
            <button class="btn btn-outline-primary btn-sm btn-pill px-3" data-go="doc">서류 검토로</button>
          </div>

          <div class="table-responsive">
            <table class="table table-sm align-middle mb-0">
              <thead>
              <tr>
                <th>튜터</th>
                <th>유형</th>
                <th>업로드일</th>
                <th>상태</th>
              </tr>
              </thead>
              <tbody id="dashDocTbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="col-lg-5">
      <div class="card admin-card shadow-sm mb-3">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <div>
              <div class="panel-title">정산 대기 TOP</div>
              <div class="muted small">송금해야 할 금액이 있는 튜터</div>
            </div>
            <button class="btn btn-outline-primary btn-sm btn-pill px-3" data-go="settlement">정산으로</button>
          </div>

          <div class="table-responsive">
            <table class="table table-sm align-middle mb-0">
              <thead>
              <tr>
                <th>튜터</th>
                <th class="text-end">금액</th>
              </tr>
              </thead>
              <tbody id="dashSettleTbody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="card admin-card shadow-sm">
        <div class="card-body">
          <div class="panel-title mb-2">최근 문의</div>
          <div class="table-responsive">
            <table class="table table-sm align-middle mb-0">
              <thead>
              <tr>
                <th>제목</th>
                <th>상태</th>
              </tr>
              </thead>
              <tbody id="dashTicketTbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
