spring.application.name=teamproject
spring.profiles.active=local

# 서버 포트
server.port=8080
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# 데이터베이스 - MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/matching?serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false&autoReconnection=true&autoReconnection=true
spring.datasource.username=root
spring.datasource.password=123456

# MyBatis 설정
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.aloha.teamproject.dto
# MyBatis 매퍼 파일 경로 : ~/메인패키지/mapper/**/**.xml
mybatis.mapper-locations=classpath:com/aloha/teamproject/mapper/**/**.xml

# 로그 레벨 설정
# level : TRACE, DEBUG, INFO, WARN, ERROR
logging.level.com.aloha.teamproject=INFO
# ANSI 컬러 출력 설정
spring.output.ansi.enabled=ALWAYS

# 에러 응답에 메시지/바인딩 에러/스택트레이스 포함
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG

# DevTools 설정
spring.devtools.restart.enabled=true
spring.thymeleaf.cache=false
spring.web.resources.cache.period=0

jwt.secret=change-me-change-me-change-me-change-me-32chars
jwt.access-exp=900000
jwt.refresh-exp=1209600000

# JWT 설정 (최소 32자 이상 권장)
# ===============================
# OAUTH2 설정
# ===============================
# 중요: 아래 YOUR_* 값들을 실제 OAuth 설정 값으로 교체해야 합니다.
# 교체하지 않으면 '401 invalid_client' 등 인증 오류가 발생할 수 있습니다.

# =========================================
# 구글(Google) OAuth2 설정 방법 (간단)
# =========================================
# 1. https://console.cloud.google.com 에 접속
# 2. 프로젝트를 선택 또는 생성
# 3. API 및 서비스 > 사용자 인증 정보(Credentials)로 이동
# 4. OAuth 2.0 클라이언트 ID를 생성
# 5. 애플리케이션 유형은 '웹 애플리케이션' 선택
# 6. 승인된 리디렉션 URI(Authorized redirect URI)에
#    http://localhost:8080/login/oauth2/code/google 추가
# 7. 생성한 Client ID / Client Secret 값을 아래에 입력
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# =========================================
# 네이버(Naver) OAuth2 설정 방법 (간단)
# =========================================
# 1. https://developers.naver.com/apps 에 접속
# 2. 애플리케이션 등록 후 Client ID / Client Secret 발급
# 3. Callback URL에 http://localhost:8080/login/oauth2/code/naver 추가
# 4. 필요한 scope(name,email 등) 설정
spring.security.oauth2.client.registration.naver.client-id=YOUR_NAVER_CLIENT_ID
spring.security.oauth2.client.registration.naver.client-secret=YOUR_NAVER_CLIENT_SECRET
spring.security.oauth2.client.registration.naver.scope=name,email
spring.security.oauth2.client.registration.naver.client-name=Naver
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

# =========================================
# 카카오(Kakao) OAuth2 설정 방법 (간단)
# =========================================
# 1. https://developers.kakao.com/console 에 접속
# 2. 애플리케이션 생성 및 플랫폼에 'Web' 추가
# 3. Redirect URI에 http://localhost:8080/login/oauth2/code/kakao 추가
# 4. REST API 키(Client ID)를 등록
spring.security.oauth2.client.registration.kakao.client-id=YOUR_KAKAO_REST_API_KEY
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id
