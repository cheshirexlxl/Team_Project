<div xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
    <section class="edit-section">
        <div class="card edit-card shadow-sm mb-4">
            <div class="card-body">
                <div class="step-section-title">기본 정보</div>
                <div class="step-section-desc">이름, 프로필 이미지를 수정하세요</div>
                <div class="admin-box mb-3">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">이메일</label>
                            <input type="text" class="form-control" id="editUsername" name="username" disabled>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">닉네임</label>
                            <input type="text" class="form-control" id="editNickname" name="nickname" disabled>
                        </div>
                    </div>
                </div>
                <div class="admin-box mb-3">
                    <div class="row g-3">
                        <div>
                            <label class="form-label">이름 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="editName" name="name" required>
                        </div>                        
                    </div>
                </div>
                <div class="admin-box">
                    <div class="fw-semibold mb-2">프로필 이미지</div>
                    <div class="d-flex align-items-center gap-3">
                        <div id="currentProfileImg" class="rounded-circle bg-info text-white d-flex align-items-center justify-content-center" style="width:80px;height:80px;font-size:2rem;">
                            <span class="fs-4">👤</span>
                        </div>
                        <div class="flex-grow-1">
                            <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
                                <div>
                                    <div class="fw-semibold">파일 업로드</div>
                                    <div class="small text-muted">JPG, PNG 가능 · 최대 5MB</div>
                                </div>
                                <label for="editProfileImg" class="btn btn-outline-primary btn-sm mb-0">
                                    파일 선택
                                    <input type="file" class="d-none" id="editProfileImg" name="profileImg" accept="image/*">
                                </label>
                            </div>
                        </div>
                    </div>                  
                </div>
            </div>
        </div>
    </section>
    <div class="d-flex justify-content-end gap-2">        
        <button type="button" class="btn btn-primary px-4" onclick="saveSection('basic')">
            <i class="bi bi-check-lg me-1"></i> 기본 정보 저장
        </button>
    </div>
</div>
