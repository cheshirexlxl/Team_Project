<section class="edit-section">
  <div class="card edit-card shadow-sm mb-4">
    <div class="card-body">
      <div class="step-section-title">보안</div>
      <div class="step-section-desc">비밀번호를 변경하세요</div>

      <div id="securityGate" class="admin-box">
        <div class="alert alert-info small mb-3">
          <i class="bi bi-info-circle me-1"></i> 보안 탭 접근을 위해 현재 비밀번호를 확인합니다.
        </div>

        <div class="row g-3 align-items-end">
          <div class="col-md-8">
            <label class="form-label">현재 비밀번호</label>
            <input type="password" class="form-control" id="securityPassword" placeholder="현재 비밀번호 입력">
            <div id="securityError" class="text-danger small mt-2 d-none"></div>
          </div>
          <div class="col-md-4">
            <button type="button" class="btn btn-outline-primary w-100" id="btnSecurityVerify">
              확인
            </button>
          </div>
        </div>
      </div>

      <div id="securityForm" class="admin-box d-none">
        <div class="alert alert-warning small mb-3">
          <div><i class="bi bi-exclamation-triangle me-1"></i> 비밀번호 변경 시에만 입력하세요. 빈칸으로 두면 기존 비밀번호가 유지됩니다.</div>
          <div><i class="bi bi-exclamation-triangle me-1"></i> 비밀번호는 6자 이상이며 특수문자를 1개 이상 포함해야 합니다.</div>
        </div>

        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">새 비밀번호</label>
            <input type="password" class="form-control" id="editPassword" name="password" 
                   placeholder="변경 시에만 입력">
          </div>
          <div class="col-md-6">
            <label class="form-label">비밀번호 확인</label>
            <input type="password" class="form-control" id="editPasswordConfirm" name="passwordConfirm" 
                   placeholder="비밀번호 확인">
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
<!-- 섹션별 저장 버튼 -->
<div class="d-flex justify-content-end gap-2">   
    <button type="button" class="btn btn-primary px-4" onclick="saveSection('security')">
        <i class="bi bi-check-lg me-1"></i> 비밀번호 변경
    </button>
</div>
