<section class="edit-section">
  <div class="card edit-card shadow-sm mb-4">
    <div class="card-body">
      <style>
        #lessonList .lesson-item-actions {
          display: flex;
          align-items: center;
          gap: 0.5rem;
        }

        #lessonList .lesson-action-btn {
          width: 38px;
          height: 38px;
          padding: 0;
          border-radius: 10px;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          font-size: 0.95rem;
        }
      </style>
      <div class="step-section-title">수업관리</div>
      <div class="step-section-desc">카드를 추가/수정한 뒤 하단 수업 저장 버튼으로 한 번에 반영합니다.</div>

      <div class="admin-box">
        <div class="mb-4">
          <div class="mb-3">
            <h5 class="fw-bold mb-3">과목</h5>
            <div id="lessonSubjectButtons" class="d-flex flex-wrap gap-2"></div>
          </div>

          <div class="mb-3">
            <h5 class="fw-bold mb-3">일반 분야</h5>
            <div id="lessonGeneralFieldButtons" class="d-flex flex-wrap gap-2"></div>
          </div>

          <div class="mb-3">
            <h5 class="fw-bold mb-3">분야별</h5>
            <div id="lessonDomainFieldButtons" class="d-flex flex-wrap gap-2"></div>
            <small class="text-muted d-block mt-2">일반 분야/분야별 중 하나만 선택됩니다.</small>
          </div>

          <div class="row g-2 align-items-end">
            <div class="col-md-6">
              <label class="form-label small text-muted">수업료(원)</label>
              <input type="number" class="form-control" id="lessonPriceInput" min="0" step="1000" placeholder="예: 30000">
            </div>
            <div class="col-md-6 d-flex justify-content-end gap-2">
              <button type="button" class="btn btn-outline-primary" id="btnLessonDraftSave">카드 추가</button>
              <button type="button" class="btn btn-outline-secondary d-none" id="btnLessonCancelEdit">수정 취소</button>
            </div>
          </div>

          <div class="mt-3">
            <label class="form-label small text-muted">설명 (선택)</label>
            <textarea class="form-control" id="lessonDescriptionInput" rows="2" placeholder="수업 설명을 입력하세요"></textarea>
          </div>

          <div id="lessonDraftHint" class="small text-muted mt-2">
            카드 변경 후 하단 <strong>수업 저장</strong> 버튼을 눌러 DB에 반영하세요.
          </div>
        </div>

        <div id="lessonList" class="d-flex flex-column gap-2"></div>
      </div>
    </div>
  </div>
</section>

<script>
  (() => {
    const lessonState = {
      subjects: [],
      fields: [],
      subjectMap: new Map(),
      fieldMap: new Map(),
      selectedSubjectId: '',
      selectedSubjectName: '',
      selectedFieldId: '',
      selectedFieldName: '',
      selectedFieldType: '',
      editingLessonId: '',
      lessons: [],
      dirtyLessonIds: new Set(),
      deletedLessonIds: new Set(),
      tempSeq: 1
    };

    const byId = (id) => document.getElementById(id);

    const lessonFetch = (url, options = {}) => {
      if (typeof fetchWithAuth === 'function') {
        return fetchWithAuth(url, options);
      }
      return fetch(url, options);
    };

    function isTempLessonId(lessonId) {
      return String(lessonId || '').startsWith('temp-');
    }

    function createTempLessonId() {
      lessonState.tempSeq += 1;
      return `temp-${Date.now()}-${lessonState.tempSeq}`;
    }

    function syncDraftHint() {
      const hintEl = byId('lessonDraftHint');
      if (!hintEl) return;

      const hasPending = lessonState.dirtyLessonIds.size > 0 || lessonState.deletedLessonIds.size > 0;
      if (hasPending) {
        hintEl.classList.remove('text-muted');
        hintEl.classList.add('text-danger');
        hintEl.innerHTML = '미저장 변경사항이 있습니다. 하단 <strong>수업 저장</strong> 버튼을 눌러 DB에 반영하세요.';
        return;
      }

      hintEl.classList.remove('text-danger');
      hintEl.classList.add('text-muted');
      hintEl.innerHTML = '카드 변경 후 하단 <strong>수업 저장</strong> 버튼을 눌러 DB에 반영하세요.';
    }

    function setActiveButton(container, targetBtn) {
      if (!container) return;
      container.querySelectorAll('button').forEach((btn) => {
        btn.classList.remove('btn-primary');
        btn.classList.add('btn-outline-primary');
      });
      if (targetBtn) {
        targetBtn.classList.add('btn-primary');
        targetBtn.classList.remove('btn-outline-primary');
      }
    }

    function resetLessonForm() {
      lessonState.selectedSubjectId = '';
      lessonState.selectedSubjectName = '';
      lessonState.selectedFieldId = '';
      lessonState.selectedFieldName = '';
      lessonState.selectedFieldType = '';
      lessonState.editingLessonId = '';

      if (byId('lessonPriceInput')) byId('lessonPriceInput').value = '';
      if (byId('lessonDescriptionInput')) byId('lessonDescriptionInput').value = '';

      setActiveButton(byId('lessonSubjectButtons'), null);
      setActiveButton(byId('lessonGeneralFieldButtons'), null);
      setActiveButton(byId('lessonDomainFieldButtons'), null);

      if (byId('btnLessonDraftSave')) byId('btnLessonDraftSave').textContent = '카드 추가';
      byId('btnLessonCancelEdit')?.classList.add('d-none');
    }

    function renderSubjectButtons(subjects) {
      const container = byId('lessonSubjectButtons');
      if (!container) return;

      container.innerHTML = '';
      subjects.forEach((subject) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn btn-sm btn-outline-primary rounded-pill';
        btn.textContent = subject.name;
        btn.dataset.subjectId = subject.id;
        btn.dataset.subjectName = subject.name;

        btn.addEventListener('click', () => {
          lessonState.selectedSubjectId = subject.id;
          lessonState.selectedSubjectName = subject.name;
          setActiveButton(container, btn);
        });

        container.appendChild(btn);
      });
    }

    function renderFieldButtons(fields) {
      const generalContainer = byId('lessonGeneralFieldButtons');
      const domainContainer = byId('lessonDomainFieldButtons');
      if (!generalContainer || !domainContainer) return;

      generalContainer.innerHTML = '';
      domainContainer.innerHTML = '';

      fields.forEach((field) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn btn-sm btn-outline-primary rounded-pill';
        btn.textContent = field.name;
        btn.dataset.fieldId = String(field.id);
        btn.dataset.fieldType = field.category === 'DOMAIN' ? 'DOMAIN' : 'GENERAL';

        btn.addEventListener('click', () => {
          lessonState.selectedFieldId = String(field.id);
          lessonState.selectedFieldName = field.name;
          lessonState.selectedFieldType = btn.dataset.fieldType;

          if (lessonState.selectedFieldType === 'DOMAIN') {
            setActiveButton(domainContainer, btn);
            setActiveButton(generalContainer, null);
            return;
          }
          setActiveButton(generalContainer, btn);
          setActiveButton(domainContainer, null);
        });

        if (field.category === 'DOMAIN') {
          domainContainer.appendChild(btn);
        } else {
          generalContainer.appendChild(btn);
        }
      });
    }

    function selectSubjectById(subjectId) {
      const container = byId('lessonSubjectButtons');
      if (!container || !subjectId) return;

      const btn = container.querySelector(`button[data-subject-id="${subjectId}"]`);
      if (!btn) return;

      lessonState.selectedSubjectId = btn.dataset.subjectId;
      lessonState.selectedSubjectName = btn.dataset.subjectName;
      setActiveButton(container, btn);
    }

    function selectFieldById(fieldId) {
      if (!fieldId) return;
      const selector = `#lessonGeneralFieldButtons button[data-field-id="${fieldId}"], #lessonDomainFieldButtons button[data-field-id="${fieldId}"]`;
      const btn = document.querySelector(selector);
      if (!btn) return;

      lessonState.selectedFieldId = btn.dataset.fieldId;
      lessonState.selectedFieldName = btn.textContent;
      lessonState.selectedFieldType = btn.dataset.fieldType;

      const generalContainer = byId('lessonGeneralFieldButtons');
      const domainContainer = byId('lessonDomainFieldButtons');
      if (btn.closest('#lessonDomainFieldButtons')) {
        setActiveButton(domainContainer, btn);
        setActiveButton(generalContainer, null);
        return;
      }
      setActiveButton(generalContainer, btn);
      setActiveButton(domainContainer, null);
    }

    async function loadSubjects() {
      const response = await lessonFetch('/api/subjects');
      if (!response.ok) throw new Error('과목 조회 실패');

      const result = await response.json();
      if (!(result && result.success && Array.isArray(result.data))) {
        throw new Error(result?.message || '과목 데이터 형식 오류');
      }

      lessonState.subjects = result.data;
      lessonState.subjectMap = new Map(result.data.map((s) => [s.id, s.name]));
      renderSubjectButtons(result.data);
    }

    async function loadFields() {
      const response = await lessonFetch('/api/language-fields');
      if (!response.ok) throw new Error('분야 조회 실패');

      const result = await response.json();
      if (!(result && result.success && Array.isArray(result.data))) {
        throw new Error(result?.message || '분야 데이터 형식 오류');
      }

      lessonState.fields = result.data;
      lessonState.fieldMap = new Map(result.data.map((f) => [String(f.id), f.name]));
      renderFieldButtons(result.data);
    }

    function normalizeLesson(lesson) {
      return {
        id: lesson.id || createTempLessonId(),
        subjectId: lesson.subjectId || '',
        fieldId: String(lesson.fieldId || ''),
        description: lesson.description || '',
        price: Number(lesson.price || 0)
      };
    }

    function renderEmptyLessonList(message = '등록된 수업 카드가 없습니다.') {
      const container = byId('lessonList');
      if (!container) return;
      container.innerHTML = `<div class="text-muted">${message}</div>`;
    }

    function renderLessons() {
      const container = byId('lessonList');
      if (!container) return;

      container.innerHTML = '';
      if (!Array.isArray(lessonState.lessons) || lessonState.lessons.length === 0) {
        renderEmptyLessonList();
        syncDraftHint();
        return;
      }

      lessonState.lessons.forEach((lesson) => {
        const subjectName = lessonState.subjectMap.get(lesson.subjectId) || lesson.subjectId || '-';
        const fieldName = lessonState.fieldMap.get(String(lesson.fieldId)) || lesson.fieldId || '-';
        const priceText = new Intl.NumberFormat('ko-KR').format(Number(lesson.price || 0));
        const isTemp = isTempLessonId(lesson.id);
        const isDirty = lessonState.dirtyLessonIds.has(lesson.id);

        const item = document.createElement('div');
        item.className = 'border rounded-12 p-3';
        item.innerHTML = `
          <div class="d-flex justify-content-between align-items-center gap-2 flex-wrap">
            <div>
              <div class="fw-bold">
                ${subjectName}${fieldName ? ` - ${fieldName}` : ''}
                ${isTemp ? '<span class="badge bg-warning text-dark ms-2">임시</span>' : ''}
                ${isDirty ? '<span class="badge bg-info text-dark ms-1">변경됨</span>' : ''}
              </div>
              <div class="text-muted small">${lesson.description || ''}</div>
              <div class="text-muted">가격 ${priceText}원</div>
            </div>
            <div class="lesson-item-actions">
              <button type="button" class="btn btn-outline-primary lesson-action-btn" title="수정"><i class="bi bi-pencil-square"></i></button>
              <button type="button" class="btn btn-outline-danger lesson-action-btn btn-delete" title="삭제"><i class="bi bi-trash"></i></button>
            </div>
          </div>
        `;

        const [editBtn, deleteBtn] = item.querySelectorAll('button');

        editBtn.addEventListener('click', () => {
          lessonState.editingLessonId = lesson.id;
          if (byId('lessonPriceInput')) byId('lessonPriceInput').value = lesson.price || '';
          if (byId('lessonDescriptionInput')) byId('lessonDescriptionInput').value = lesson.description || '';
          selectSubjectById(lesson.subjectId);
          selectFieldById(String(lesson.fieldId || ''));

          if (byId('btnLessonDraftSave')) byId('btnLessonDraftSave').textContent = '카드 수정';
          byId('btnLessonCancelEdit')?.classList.remove('d-none');
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        deleteBtn.addEventListener('click', () => {
          if (!confirm('정말 삭제하시겠습니까?')) return;

          lessonState.lessons = lessonState.lessons.filter((itemLesson) => itemLesson.id !== lesson.id);
          lessonState.dirtyLessonIds.delete(lesson.id);
          if (!isTempLessonId(lesson.id)) {
            lessonState.deletedLessonIds.add(lesson.id);
          }

          if (lessonState.editingLessonId === lesson.id) {
            resetLessonForm();
          }

          renderLessons();
          syncDraftHint();
        });

        container.appendChild(item);
      });

      syncDraftHint();
    }

    function collectLessonDraftPayload() {
      const subjectId = lessonState.selectedSubjectId;
      const fieldId = lessonState.selectedFieldId;
      const priceRaw = byId('lessonPriceInput')?.value || '';
      const description = byId('lessonDescriptionInput')?.value || '';
      const priceNumber = Number(priceRaw);

      if (!subjectId || !fieldId) {
        alert('과목과 분야를 선택해주세요.');
        return null;
      }

      if (!priceRaw || Number.isNaN(priceNumber) || priceNumber <= 0) {
        alert('유효한 수업료를 입력해주세요.');
        return null;
      }

      return {
        subjectId,
        fieldId,
        description,
        price: priceNumber
      };
    }

    function upsertLessonDraft() {
      const payload = collectLessonDraftPayload();
      if (!payload) return;

      if (lessonState.editingLessonId) {
        const idx = lessonState.lessons.findIndex((item) => item.id === lessonState.editingLessonId);
        if (idx < 0) {
          alert('수정할 카드 정보를 찾지 못했습니다.');
          return;
        }

        lessonState.lessons[idx] = {
          ...lessonState.lessons[idx],
          ...payload
        };
        lessonState.dirtyLessonIds.add(lessonState.lessons[idx].id);
      } else {
        const tempId = createTempLessonId();
        lessonState.lessons.push({
          id: tempId,
          ...payload
        });
        lessonState.dirtyLessonIds.add(tempId);
      }

      resetLessonForm();
      renderLessons();
      syncDraftHint();
    }

    function buildApiPayload(lesson) {
      const subjectName = lessonState.subjectMap.get(lesson.subjectId) || lesson.subjectId || '';
      const fieldName = lessonState.fieldMap.get(String(lesson.fieldId)) || lesson.fieldId || '';
      return {
        subjectId: lesson.subjectId,
        fieldId: lesson.fieldId,
        title: `${subjectName}${fieldName ? `-${fieldName}` : ''}`,
        description: lesson.description || '',
        price: Number(lesson.price || 0)
      };
    }

    async function persistLessonChanges() {
      const hasPending = lessonState.dirtyLessonIds.size > 0 || lessonState.deletedLessonIds.size > 0;
      if (!hasPending) {
        alert('변경된 수업이 없습니다.');
        return;
      }

      const persistBtn = byId('btnLessonPersist');
      const draftBtn = byId('btnLessonDraftSave');
      if (persistBtn) persistBtn.disabled = true;
      if (draftBtn) draftBtn.disabled = true;

      try {
        for (const lessonId of lessonState.deletedLessonIds) {
          const delRes = await lessonFetch(`/api/lessons/${lessonId}`, { method: 'DELETE' });
          const delJson = await delRes.json();
          if (!(delRes.ok && delJson.success)) {
            throw new Error(delJson?.message || '수업 삭제 실패');
          }
        }

        for (const lesson of lessonState.lessons) {
          if (!lessonState.dirtyLessonIds.has(lesson.id)) continue;

          const payload = buildApiPayload(lesson);
          const isTemp = isTempLessonId(lesson.id);
          const url = isTemp ? '/api/lessons' : `/api/lessons/${lesson.id}`;
          const method = isTemp ? 'POST' : 'PUT';

          const response = await lessonFetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const result = await response.json();
          if (!(response.ok && result.success)) {
            throw new Error(result?.message || '수업 저장 실패');
          }
        }

        alert('수업이 저장되었습니다.');
        if (typeof window.reloadProfileEditSection === 'function') {
          window.reloadProfileEditSection('lessons');
          return;
        }
        window.location.href = '/tutor/profile-edit?section=lessons';
      } catch (error) {
        console.error(error);
        alert(error.message || '수업 저장에 실패했습니다.');
      } finally {
        if (persistBtn) persistBtn.disabled = false;
        if (draftBtn) draftBtn.disabled = false;
      }
    }

    async function loadLessons() {
      const response = await lessonFetch('/api/lessons/my');
      if (!response.ok) throw new Error('수업 목록 조회 실패');

      const result = await response.json();
      if (!(result && result.success && Array.isArray(result.data))) {
        throw new Error(result?.message || '수업 목록 조회 실패');
      }

      lessonState.lessons = result.data.map(normalizeLesson);
      lessonState.dirtyLessonIds.clear();
      lessonState.deletedLessonIds.clear();
      resetLessonForm();
      renderLessons();
      syncDraftHint();
    }

    function bindLessonEvents() {
      byId('btnLessonDraftSave')?.addEventListener('click', () => {
        upsertLessonDraft();
      });

      byId('btnLessonCancelEdit')?.addEventListener('click', () => {
        resetLessonForm();
      });

      byId('btnLessonPersist')?.addEventListener('click', async () => {
        await persistLessonChanges();
      });
    }

    async function initLessonSection() {
      if (!byId('lessonList')) return;

      try {
        await loadSubjects();
        await loadFields();
        bindLessonEvents();
        await loadLessons();
      } catch (error) {
        console.error(error);
        renderEmptyLessonList(error.message || '수업 정보를 불러오지 못했습니다.');
      }
    }

    initLessonSection();
  })();
</script>

<div class="d-flex justify-content-end">
  <button type="button" class="btn btn-primary px-4" id="btnLessonPersist">
    <i class="bi bi-check-lg me-1"></i> 수업 저장
  </button>
</div>
