<section class="edit-section">
  <div class="card edit-card shadow-sm mb-4">
    <div class="card-body">
      <div class="step-section-title">계좌 정보</div>
      <div class="step-section-desc">정산을 위한 계좌 정보를 입력하세요</div>

      <div class="admin-box">
        <div class="alert alert-info small mb-3">
          <i class="bi bi-info-circle me-1"></i> 정산을 위한 계좌 정보입니다. 정확하게 입력해 주세요.
        </div>

        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label">은행명 <span class="text-danger">*</span></label>
            <select class="form-select" id="editBankName" name="bankName" required>
              <option value="">은행을 선택하세요</option>
              <option value="국민은행">국민은행</option>
              <option value="우리은행">우리은행</option>
              <option value="신한은행">신한은행</option>
              <option value="하나은행">하나은행</option>
              <option value="카카오뱅크">카카오뱅크</option>
              <option value="NH농협">NH농협</option>
              <option value="기업은행">기업은행</option>
              <option value="대구은행">대구은행</option>
              <option value="부산은행">부산은행</option>
              <option value="광주은행">광주은행</option>
              <option value="전북은행">전북은행</option>
              <option value="제주은행">제주은행</option>
              <option value="수협">수협</option>
              <option value="산업은행">산업은행</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">계좌번호 <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="editAccountNumber" name="accountNumber" 
                   placeholder="계좌번호 입력" required>
          </div>
        </div>

        <div class="mb-1">
          <label class="form-label">예금주명 <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="editAccountHolder" name="accountHolder" 
                 placeholder="예금주명 입력" required>
        </div>
      </div>
    </div>
  </div>
</section>
<!-- 섹션별 저장 버튼 -->
<div class="d-flex justify-content-end">
    <button type="button" class="btn btn-primary px-4" onclick="saveSection('account')">
        <i class="bi bi-check-lg me-1"></i> 계좌 정보 저장
    </button>
</div>
