<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main_layout}">
<head>
    <th:block layout:fragment="title">
        <title>결제 진행 | 튜터 플랫폼</title>
    </th:block>
    <th:block layout:fragment="extra-css">
        <style>
            .pay-card{border:1px solid #e5e7eb;border-radius:16px;background:#fff;box-shadow:0 6px 18px rgba(16,24,40,.06);} 
            .pay-title{font-weight:800;font-size:1.1rem;}
            .pay-sub{color:#64748b;font-size:.9rem;}
            .pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
            @media (max-width: 768px){.pay-grid{grid-template-columns:1fr;}}
        </style>
    </th:block>
</head>
<body>
<main layout:fragment="content">
    <div class="container my-5" style="max-width: 760px;">
        <div class="mb-4 text-center">
            <h2 class="fw-bold">결제 진행(임시)</h2>
            <p class="pay-sub mb-0">토스 결제 연동 전 임시 화면입니다.</p>
        </div>

        <div class="pay-card p-4">
            <div class="pay-title mb-2">결제 정보</div>
            <div class="pay-sub mb-3">예약/수업 정보를 입력하고 다음 단계로 이동합니다.</div>

            <div class="pay-grid">
                <div>
                    <label class="form-label">예약 ID</label>
                    <input type="text" class="form-control" id="bookingId" placeholder="bookingId">
                </div>
                <div>
                    <label class="form-label">금액</label>
                    <input type="number" class="form-control" id="amount" placeholder="10000">
                </div>
                <div>
                    <label class="form-label">주문명</label>
                    <input type="text" class="form-control" id="orderName" placeholder="수업 결제">
                </div>
                <div>
                    <label class="form-label">구매자명</label>
                    <input type="text" class="form-control" id="customerName" placeholder="홍길동">
                </div>
            </div>

            <div class="mt-4 d-flex flex-wrap gap-2 align-items-center">
                <button type="button" class="btn btn-primary" id="btnSuccess">성공 화면</button>
                <button type="button" class="btn btn-outline-danger" id="btnFail">실패 화면</button>
                <span class="badge text-bg-light border">토스 결제(예정)</span>
            </div>

            <div class="mt-3 small text-muted">
                * 임시 화면입니다. 토스 결제창 호출/검증은 백엔드 연동 후 추가됩니다.
            </div>
        </div>
    </div>
</main>

<th:block layout:fragment="extra-scripts">
    <script>
        document.getElementById('btnSuccess').addEventListener('click', () => {
            const amount = document.getElementById('amount').value.trim();
            const paymentId = 'pay_' + Date.now();
            const orderId = 'order_' + Date.now();
            location.href = `/payments/success?paymentId=${encodeURIComponent(paymentId)}&orderId=${encodeURIComponent(orderId)}&amount=${encodeURIComponent(amount)}`;
        });

        document.getElementById('btnFail').addEventListener('click', () => {
            const paymentId = 'pay_' + Date.now();
            const code = 'PAY_FAIL';
            const message = '결제 실패(임시)';
            location.href = `/payments/fail?paymentId=${encodeURIComponent(paymentId)}&code=${encodeURIComponent(code)}&message=${encodeURIComponent(message)}`;
        });
    </script>
</th:block>
</body>
</html>
